services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Sch1chtpilot!Dev"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Sch1chtpilot!Dev' -Q 'SELECT 1' -No -C
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  api:
    build:
      context: ./Backend
      dockerfile: Schichtpilot/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=SchichtpilotDb;User Id=sa;Password=Sch1chtpilot!Dev;TrustServerCertificate=True;"
      AuthCookieName: "SchichtPilotAuthCookie"
      AuthenticationSettings__JwtKey: "dev-docker-jwt-key-for-local-testing-only-32ch!"
      AuthenticationSettings__TokenLifeTimeInMinutes: "720"
      AllowedCors__0: "http://localhost:5173"
      AllowedCors__1: "http://localhost:4200"
      AzureEmail__ConnectionString: "endpoint=https://dummy.communication.azure.com/;accesskey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      AzureEmail__SenderAddress: "noreply@localhost"
      AzureEmail__SendMail: "false"
      CreateTestData: "true"
    depends_on:
      db:
        condition: service_healthy
