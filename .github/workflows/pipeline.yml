name: Build and Push Docker Image

on:
  push:
    branches: ["main"]

# This is critical: The workflow needs permission to write to the registry
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x" # Match your project version

      # 1. Quality Check: Ensure code follows style rules
      - name: Check Formatting
        run: dotnet format Backend/Schichtpilot.sln --verify-no-changes

      # 2. Restore Dependencies
      - name: Restore
        run: dotnet restore Backend/Schichtpilot.sln

      # 3. Run Unit Tests
      - name: Run Tests
        run: dotnet test Backend/Schichtpilot.sln --no-restore --verbosity normal

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: Backend/Schichtpilot/Dockerfile
          push: true # Now we set this to true
          # The tag must be lowercase: ghcr.io/your-username/repository-name:tag
          tags: |
            ghcr.io/rauhofere/schichtpilot:latest
            ghcr.io/rauhofere/schichtpilot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
